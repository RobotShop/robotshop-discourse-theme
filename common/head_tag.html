<script type="text/discourse-plugin" version="0.8.23">
var computed = require("ember-addons/ember-computed-decorators").default;
api.modifyClass('controller:composer',
    {
      save(opts) {
        var categoryNb = $('.category-input .category-chooser .selected-name > span.name > span.badge-wrapper').length;
        if((categoryNb !== 0 && categoryNb < 2)  ) {
            this.set("lastValidatedAt", Date.now());
            return false;
        }
        return this._super(opts);
      },
      @computed("model.categoryId", "lastValidatedAt")
      categoryValidation(categoryId, lastValidatedAt) {
          var InputValidation = require("@ember/object").default;
          var categoryNb = $('.category-input .category-chooser .selected-name > span.name > span.badge-wrapper').length;
          if( (categoryNb !== 0 && categoryNb < 2)  ) {
              return InputValidation.create({
                  failed: true,
                  reason: 'You need to select a subcategory',
                  lastShownAt: lastValidatedAt
                });
          } else {
              return this._super(categoryId, lastValidatedAt);
          }
      }
  }
);
</script>

<script type="text/discourse-plugin" version="0.8.23">
api.reopenWidget("header-dropdown", {
  html(attrs) {
    var h = require("virtual-dom").h;
    if (attrs.icon == 'bars') {
        return h('a.icon.btn-flat#toggle-hamburger-menu', "Forum Options");
    } else if (attrs.icon == 'search') {
        return h('a', "");
    } else {
        return this._super(attrs);
    }
  }
});
</script>
